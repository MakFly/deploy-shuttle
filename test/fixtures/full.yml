app: myapp
domain:
  - myapp.example.com
  - www.myapp.example.com

build:
  dockerfile: docker/Dockerfile.prod
  context: .
  target: production
  args:
    NODE_ENV: production

deploy:
  strategy: blue-green
  blue_green:
    drain_timeout: 30
    readiness_delay: 5
  timeout: 120
  retain: 5
  auto_rollback: true
  hooks:
    pre_deploy:
      - shuttle exec -- bun run migrate
    post_deploy:
      - shuttle exec -- bun run cache:clear

servers:
  web:
    hosts:
      - 203.0.113.10
      - 203.0.113.11
    user: deploy
  worker:
    hosts:
      - 203.0.113.12
    user: deploy

services:
  web:
    port: 3000
    command: bun run start
    healthcheck:
      type: http
      path: /health
      interval: 5
      timeout: 3
      retries: 5
  worker:
    command: bun run worker
    replicas: 2
    healthcheck:
      type: exec
      command: bun run healthcheck:worker

accessories:
  postgres:
    image: postgres:16-alpine
    port: "127.0.0.1:5432:5432"
    volumes:
      - /data/myapp/postgres:/var/lib/postgresql/data
    env:
      POSTGRES_DB: myapp

secrets:
  file: .shuttle/secrets.enc
  driver: aes

env:
  clear:
    APP_ENV: production
    LOG_LEVEL: info
  secret:
    - DATABASE_URL
    - REDIS_URL
    - APP_KEY

proxy:
  ssl:
    provider: letsencrypt
    email: admin@example.com
  headers:
    Strict-Transport-Security: "max-age=63072000"
    X-Content-Type-Options: nosniff

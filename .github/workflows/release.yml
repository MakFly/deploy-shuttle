name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...
        working-directory: go-cli

      - name: Build all targets
        run: sh scripts/build-go.sh
        env:
          DEPLOY_SHUTTLE_VERSION: ${{ github.ref_name }}
          LICENSE_PUBKEY_B64: ${{ secrets.LICENSE_PUBKEY_B64 }}
          LICENSE_SERVER: ${{ vars.LICENSE_SERVER }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deploy-shuttle-linux-x64
            dist/deploy-shuttle-linux-arm64
            dist/deploy-shuttle-darwin-arm64
            dist/deploy-shuttle-darwin-x64
            dist/checksums.txt
          generate_release_notes: true

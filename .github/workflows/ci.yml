name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Format
        run: test -z "$(gofmt -l go-cli)"
      - name: Vet
        run: go vet ./...
        working-directory: go-cli
      - name: Tests
        run: go test ./...
        working-directory: go-cli
  license-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1'
      - name: Install
        run: bun install
        working-directory: license-server
      - name: Typecheck
        run: bun run typecheck
        working-directory: license-server
      - name: Tests
        run: bun test
        working-directory: license-server
